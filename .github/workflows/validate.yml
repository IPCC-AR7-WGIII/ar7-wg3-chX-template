name: Validate Figure Folder Structure

on:
  push:
    branches:
      - main

jobs:
  validate-structure:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Validate figure folders
        shell: bash
        run: |
          set -euo pipefail

          echo "Validating figure folder structure..."

          shopt -s nullglob
          fig_dirs=(fig*)
          shopt -u nullglob

          if [ ${#fig_dirs[@]} -eq 0 ]; then
            echo "No figure folders found (fig*)"
            exit 1
          fi

          overall_fail=0

          for dir in "${fig_dirs[@]}"; do
            if [ -d "$dir" ]; then
              echo ""
              echo "📁 Checking folder: $dir"
              missing=0

              # -----------------------------
              # Required contents
              # -----------------------------
              required=("code" "data" "figure" "CITATION.cff" "README.md" "LICENSE")

              for item in "${required[@]}"; do
                if [ ! -e "$dir/$item" ]; then
                  echo "❌ Missing required item: $item"
                  missing=$((missing+1))
                else
                  echo "Found: $item"
                fi
              done

              # -----------------------------
              # Final result for folder
              # -----------------------------
              if [ $missing -eq 0 ]; then
                echo "✅ $dir passed validation"
              else
                echo "⚠️ $dir failed validation ($missing issue(s))"
                overall_fail=1
              fi
            fi
          done

          echo ""
          if [ $overall_fail -eq 0 ]; then
            echo "✅ Repository structure validation completed successfully"
          else
            echo "❌ Repository structure validation failed"
            exit 1
          fi
